services:
  postgres:
    image: postgres:18-alpine
    container_name: apihub-postgres
    env_file: ./server/.env
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./server
      target: migrate
    container_name: apihub-migrate
    env_file: ./server/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: ./server
      target: production
    container_name: apihub-server
    env_file: ./server/.env
    environment:
      - DATABASE_URL=postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  client:
    build:
      context: ./client
    container_name: apihub-client
    env_file: ./client/.env
    ports:
      - "${VITE_PORT}:80"
    depends_on:
      server:
        condition: service_started

volumes:
  postgres_data:
